<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002410" />
      <stop offset="50%" stop-color="#004B23" />
      <stop offset="100%" stop-color="#031A0E" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E396" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8010" />
    </linearGradient>
    <pattern id="islamicGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 40 20 L 20 40 L 0 20 Z" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.12" />
      <circle cx="20" cy="20" r="2" fill="#D4AF37" fill-opacity="0.2" />
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#emeraldGrad)" />
  <rect width="100%" height="100%" fill="url(#islamicGrid)" />
  
  <!-- Stylized Decorative Arch -->
  <path d="M 100 800 C 100 400, 300 100, 600 100 C 900 100, 1100 400, 1100 800 Z" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-opacity="0.25" />
  <path d="M 150 800 C 150 450, 350 150, 600 150 C 850 150, 1050 450, 1050 800 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-opacity="0.15" />
  
  <g transform="translate(600, 350)" text-anchor="middle">
    <!-- Star Emblem -->
    <path d="M 0 -80 L 24 -24 L 80 -24 L 34 12 L 54 68 L 0 32 L -54 68 L -34 12 L -80 -24 L -24 -24 Z" fill="url(#goldGrad)" opacity="0.9" />
    <circle cx="0" cy="0" r="10" fill="#004B23" />
    
    <!-- English Heading -->
    <text y="140" font-family="'Cinzel', 'Georgia', serif" font-size="38" font-weight="bold" fill="#F5EFE6" letter-spacing="2">
      MUSLIM RANGREZ NEELGAR SAMAJ
    </text>
    <text y="190" font-family="'Cinzel', 'Georgia', serif" font-size="24" font-weight="600" fill="url(#goldGrad)" letter-spacing="4">
      NATIONAL COMMUNITY EMPOWERMENT
    </text>
    
    <!-- Hindi Heading -->
    <text y="250" font-family="'Devanagari', sans-serif" font-size="32" font-weight="bold" fill="#F5EFE6">
      मुस्लिम रंगरेज नीलगर समाज महासभा
    </text>
    <text y="290" font-family="'Devanagari', sans-serif" font-size="20" font-weight="500" fill="#D4AF37">
      शिक्षा • एकता • आत्मनिर्भरता • जनकल्याण
    </text>
  </g>
</svg>

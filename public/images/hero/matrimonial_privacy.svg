<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0B2E" />
      <stop offset="50%" stop-color="#3D0C5A" />
      <stop offset="100%" stop-color="#0F031D" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E396" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8010" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#purpleGrad)" />
  
  <g transform="translate(600, 320)" text-anchor="middle">
    <!-- Stylized Lock with Islamic Arch Header -->
    <path d="M -40 0 L -40 40 C -40 50, -30 60, -20 60 L 20 60 C 30 60, 40 50, 40 40 L 40 0 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" />
    <path d="M -25 0 L -25 -25 C -25 -45, 25 -45, 25 -25 L 25 0" fill="none" stroke="url(#goldGrad)" stroke-width="4" />
    <circle cx="0" cy="25" r="8" fill="url(#goldGrad)" />
    <path d="M 0 25 L 0 45" stroke="url(#goldGrad)" stroke-width="3" />
    
    <!-- English Heading -->
    <text y="150" font-family="'Cinzel', 'Georgia', serif" font-size="38" font-weight="bold" fill="#F5EFE6" letter-spacing="2">
      SECURE & VERIFIED MATRIMONIAL PLATFORM
    </text>
    <text y="200" font-family="'Cinzel', 'Georgia', serif" font-size="24" font-weight="600" fill="url(#goldGrad)" letter-spacing="4">
      STRICT PRIVACY, PHOTO OBFUSCATION & DIRECTORY ACCESS
    </text>
    
    <!-- Hindi Heading -->
    <text y="260" font-family="'Devanagari', sans-serif" font-size="32" font-weight="bold" fill="#F5EFE6">
      सुरक्षित एवं सत्यापित वैवाहिक सेवा मंच
    </text>
    <text y="300" font-family="'Devanagari', sans-serif" font-size="20" font-weight="500" fill="#D4AF37">
      कठोर गोपनीयता नियंत्रण • सत्यापित प्रोफाइल • पारिवारिक विश्वास
    </text>
  </g>
</svg>

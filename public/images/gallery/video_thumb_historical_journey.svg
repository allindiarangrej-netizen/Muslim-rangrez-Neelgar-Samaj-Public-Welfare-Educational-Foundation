    <polygon points="-12,-20 22,0 -12,20" fill="#1E002B" />
    
    <text y="100" font-family="serif" font-size="20" font-weight="bold" fill="#FFF">HERITAGE OF DYEING DOCUMENTARY</text>
    <text y="125" font-family="serif" font-size="14" fill="url(#gold)" letter-spacing="2">HISTORICAL JOURNEY OF RANGREZ BHARAT</text>
  </g>
  <!-- Duration Badge -->
  <rect x="520" y="350" width="60" height="30" rx="5" fill="#000" opacity="0.8" />
  <text x="550" y="370" font-family="monospace" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">14:25</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021526" />
      <stop offset="100%" stop-color="#03346E" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E396" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#avatarGrad)" rx="200" />
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.6" />
  
  <g transform="translate(200, 190)">
    <!-- Face -->
    <circle cx="0" cy="-20" r="50" fill="#EAD2AC" />
    <!-- Hair -->
    <path d="M -50 -30 C -50 -70, 50 -70, 50 -30 C 60 -50, -60 -50, -50 -30" fill="#1A1A1A" />
    <!-- Beard (Modern Trimmed) -->
    <path d="M -50 -15 C -40 30, 40 30, 50 -15 C 45 5, -45 5, -50 -15" fill="#1A1A1A" />
    <!-- Eyes -->
    <circle cx="-18" cy="-20" r="4" fill="#1A1A1A" />
    <circle cx="18" cy="-20" r="4" fill="#1A1A1A" />
    <!-- Suit / Coat -->
    <path d="M -80 60 L -50 120 L 50 120 L 80 60 Z" fill="#0E1E2F" />
    <path d="M -40 60 L 0 100 L 40 60" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
    <path d="M 0 60 L 0 120" stroke="url(#goldGrad)" stroke-width="1.5" />
  </g>
  <text x="200" y="340" font-family="sans-serif" font-size="16" font-weight="bold" fill="#F5EFE6" text-anchor="middle">Mohammed Adil Rangrez</text>
  <text x="200" y="360" font-family="sans-serif" font-size="12" fill="url(#goldGrad)" text-anchor="middle">General Secretary</text>
</svg>

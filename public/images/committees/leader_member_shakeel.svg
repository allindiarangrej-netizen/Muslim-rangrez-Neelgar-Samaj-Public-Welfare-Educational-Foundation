<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00223E" />
      <stop offset="100%" stop-color="#1D976C" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E396" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#avatarGrad)" rx="200" />
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.6" />
  
  <g transform="translate(200, 190)">
    <!-- Face -->
    <circle cx="0" cy="-20" r="50" fill="#E8C39E" />
    <!-- Hair -->
    <path d="M -50 -30 C -50 -70, 50 -70, 50 -30 Z" fill="#3A3A3A" />
    <!-- Beard -->
    <path d="M -50 -10 Q 0 40 50 -10 C 30 20, -30 20, -50 -10" fill="#3A3A3A" />
    <!-- Eyes -->
    <circle cx="-18" cy="-20" r="4" fill="#3A3A3A" />
    <circle cx="18" cy="-20" r="4" fill="#3A3A3A" />
    <!-- Suit -->
    <path d="M -80 60 L -50 120 L 50 120 L 80 60 Z" fill="#0A3326" />
    <path d="M -35 60 L 0 95 L 35 60" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  </g>
  <text x="200" y="340" font-family="sans-serif" font-size="16" font-weight="bold" fill="#F5EFE6" text-anchor="middle">Janab Shakeel Ahmed Rangrez</text>
  <text x="200" y="360" font-family="sans-serif" font-size="12" fill="url(#goldGrad)" text-anchor="middle">Regional President</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003118" />
      <stop offset="100%" stop-color="#004B23" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E396" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#avatarGrad)" rx="200" />
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.6" />
  
  <!-- Male Avatar Illustration with Sherwani / Cap Collar style -->
  <g transform="translate(200, 190)">
    <!-- Cap -->
    <path d="M -50 -70 C -50 -100, 50 -100, 50 -70 Z" fill="url(#goldGrad)" />
    <!-- Face -->
    <circle cx="0" cy="-20" r="50" fill="#E6C594" />
    <!-- Beard (Traditional style) -->
    <path d="M -50 -20 C -50 40, 50 40, 50 -20 C 50 20, -50 20, -50 -20" fill="#2B2B2B" />
    <!-- Mustache -->
    <path d="M -25 -5 Q 0 5 25 -5 Q 0 -15 -25 -5" fill="#2B2B2B" />
    <!-- Eyes -->
    <circle cx="-18" cy="-25" r="4" fill="#2B2B2B" />
    <circle cx="18" cy="-25" r="4" fill="#2B2B2B" />
    <!-- Sherwani Collar -->
    <path d="M -70 50 C -70 120, 70 120, 70 50 C 40 50, 40 70, 0 70 C -40 70, -40 50, -70 50" fill="#132B1E" stroke="url(#goldGrad)" stroke-width="2" />
    <!-- Gold Buttons -->
    <circle cx="0" cy="90" r="3" fill="url(#goldGrad)" />
    <circle cx="0" cy="110" r="3" fill="url(#goldGrad)" />
  </g>
  <text x="200" y="340" font-family="sans-serif" font-size="16" font-weight="bold" fill="#F5EFE6" text-anchor="middle">Haji Mohammed Iqbal</text>
  <text x="200" y="360" font-family="sans-serif" font-size="12" fill="url(#goldGrad)" text-anchor="middle">National President</text>
</svg>
